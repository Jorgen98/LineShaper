<div class="content">
  @switch (state) {
    <!-- Default menu screen -->
    @case ('menu') {
      <p class="header">{{ "mid-points.header" | translate }}</p>
      <div>
        <button (click)="addMidPointStart()">{{ "mid-points.addBtn" | translate }}</button>
      </div>
    }
    <!-- Add new mid point screen 1 -->
    @case ('addMidPoint0') {
      <p class="header">{{ "mid-points.firstStop" | translate }}</p>
      <div>
        <button (click)="defaultMenu()">{{ "mid-points.cancelBtn" | translate }}</button>
      </div>
    }
    <!-- Add new mid point screen 2 -->
    @case ('addMidPoint1') {
      <p class="header">{{ "mid-points.finalStop" | translate }}</p>
      <div>
        <button (click)="defaultMenu()">{{ "mid-points.cancelBtn" | translate }}</button>
      </div>
    }
    <!-- Add new mid point screen warning -->
    @case ('addMidPointWarning') {
      <p class="header">{{ "mid-points.error" | translate }}</p>
      <div>
        <button (click)="defaultMenu()">{{ "mid-points.cancelBtn" | translate }}</button>
      </div>
    }
  }
</div>
